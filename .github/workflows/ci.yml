name: Alphafold Portal CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Matches your local Node v20.20.1 environment
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate Prisma Schema
      run: npx prisma validate

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run ESLint
      run: npm run lint

    - name: Build Next.js Application
      run: npm run build
      env:
        # Next.js 16 requires a placeholder string during build compilation
        DATABASE_URL: "postgresql://mock_user:mock_pass@localhost:5432/mock_db"